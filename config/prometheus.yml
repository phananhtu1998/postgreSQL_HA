global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter-1:9187
          - postgres-exporter-2:9187
          - postgres-exporter-3:9187
        labels:
          cluster: pgcluster

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
