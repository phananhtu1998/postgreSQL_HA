#=====================================================================
# HAProxy — routes traffic based on Patroni REST API state.
#   /leader  → 200 only on the current primary
#   /replica → 200 only on healthy replicas (excludes lagging nodes)
#=====================================================================

global
    log stdout format raw local0
    maxconn 4000

defaults
    log     global
    mode    tcp
    option  tcplog
    retries 2
    timeout connect 5s
    timeout client  60m
    timeout server  60m
    timeout check   5s
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

# ── Stats UI (auth required) ───────────────────────────────────────
listen stats
    bind   *:7000
    mode   http
    stats  enable
    stats  uri    /stats
    stats  refresh 5s
    stats  realm  Haproxy\ Stats
    stats  auth   admin:${HAPROXY_STATS_PASSWORD}
    stats  show-legends
    stats  show-node

# ── Write traffic (port 5000) → current Patroni leader ─────────────
frontend pg_write
    bind *:5000
    default_backend pg_primary

backend pg_primary
    option httpchk GET /leader
    http-check expect status 200
    default-server check port 8008
    server pg-1 pg-1:5432
    server pg-2 pg-2:5432
    server pg-3 pg-3:5432

# ── Read traffic (port 5001) → healthy replicas, primary as backup ─
frontend pg_read
    bind *:5001
    default_backend pg_replicas

backend pg_replicas
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server check port 8008
    server pg-1 pg-1:5432
    server pg-2 pg-2:5432
    server pg-3 pg-3:5432
    # Fallback: if all replicas are down, route reads to the leader so
    # the application keeps working in degraded mode.
    server pg-leader-fallback 127.0.0.1:5000 check disabled backup
