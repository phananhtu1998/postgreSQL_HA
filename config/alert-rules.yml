groups:
  - name: postgres-ha
    interval: 30s
    rules:
      - alert: PostgresInstanceDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Postgres instance {{ $labels.instance }} is DOWN"
          description: "pg_up=0 for {{ $labels.instance }} for 1 minute."

      - alert: PostgresPrimaryDown
        expr: count(pg_replication_is_replica == 0) < 1
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "No Postgres primary detected in cluster"
          description: "Patroni cluster has no node reporting as primary."

      - alert: PostgresReplicationLagHigh
        expr: pg_replication_lag_seconds > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Replica {{ $labels.instance }} lag >30s"
          description: "Lag = {{ $value }}s on {{ $labels.instance }}."

      - alert: PostgresTooManyConnections
        expr: sum by (instance) (pg_stat_activity_count) > 250
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} >250 active connections"

      - alert: PostgresDeadlocksRising
        expr: rate(pg_stat_database_deadlocks{datname!~"template.*"}[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deadlocks rising on {{ $labels.instance }}/{{ $labels.datname }}"

      - alert: PostgresLongRunningTransaction
        expr: pg_stat_activity_max_tx_duration{datname!~"template.*"} > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Transaction running >10m on {{ $labels.instance }}/{{ $labels.datname }}"

      - alert: PostgresXIDWraparoundRisk
        expr: pg_database_xact_commit + pg_database_xact_rollback > 1500000000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "XID wraparound approaching on {{ $labels.instance }}"
          description: "Run VACUUM FREEZE on the affected databases."

      - alert: PostgresCheckpointsTooFrequent
        expr: rate(pg_stat_bgwriter_checkpoints_req_total[5m]) > 0.1
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "Frequent requested checkpoints on {{ $labels.instance }}"
          description: "Consider increasing max_wal_size or checkpoint_timeout."
