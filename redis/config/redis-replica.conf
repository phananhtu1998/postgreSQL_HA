# ════════════════════════════════════════════════════════════════════
#  Redis Replica — Production Configuration
#  noeviction policy: replicas mirror master, must not evict
#  Variables (replicaof, replica-priority, requirepass) via CLI flags.
# ════════════════════════════════════════════════════════════════════

# ── Network ─────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Replication ─────────────────────────────────────────────────────
replica-read-only yes
replica-lazy-flush yes
replica-serve-stale-data yes
repl-diskless-load on-empty-db
repl-backlog-size 64mb
repl-timeout 60
repl-ping-replica-period 10

# ── Persistence (replicas also persist for fast restart) ────────────
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ── Memory ──────────────────────────────────────────────────────────
# noeviction: replica must hold everything master holds. If memory full,
# replica becomes read-only (returns OOM) until reconfigured/upgraded.
maxmemory-policy noeviction
maxmemory-samples 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Performance ─────────────────────────────────────────────────────
hz 20
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
latency-monitor-threshold 100
slowlog-log-slower-than 10000
slowlog-max-len 128

activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# ── Clients ─────────────────────────────────────────────────────────
maxclients 10000

# ── Logging ─────────────────────────────────────────────────────────
loglevel notice
logfile ""
