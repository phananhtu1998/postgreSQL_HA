# ════════════════════════════════════════════════════════════════════
#  Redis Master — Production Configuration
#  Auth, persistence, eviction, replication, performance pre-tuned.
#  Variables (requirepass, masterauth, maxmemory) injected via CLI.
# ════════════════════════════════════════════════════════════════════

# ── Network ─────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── Persistence (hybrid RDB + AOF for fast restart + durability) ────
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes

# ── Replication ─────────────────────────────────────────────────────
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0
repl-backlog-size 64mb
repl-backlog-ttl 3600
repl-timeout 60
repl-ping-replica-period 10

# Reject writes if quorum of replicas is missing — protects against
# split-brain partition writes that would be lost after failover.
min-replicas-to-write 1
min-replicas-max-lag 10

# ── Memory ──────────────────────────────────────────────────────────
maxmemory-policy allkeys-lru
maxmemory-samples 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# ── Performance ─────────────────────────────────────────────────────
hz 20
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
latency-monitor-threshold 100
slowlog-log-slower-than 10000
slowlog-max-len 128

activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# ── Clients ─────────────────────────────────────────────────────────
maxclients 10000

# ── Logging ─────────────────────────────────────────────────────────
loglevel notice
logfile ""
