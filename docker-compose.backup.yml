# ════════════════════════════════════════════════════════════════════
#  Backup overlay — runs pgBackRest on a cron schedule by execing into
#  the current Patroni leader.
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.backup.yml up -d
# ════════════════════════════════════════════════════════════════════

services:
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    image: postgres-ha-backup:1
    container_name: pg-backup
    restart: unless-stopped
    networks: [pg-ha]
    environment:
      BACKUP_CRON_FULL: ${BACKUP_CRON_FULL:-0 2 * * 0}
      BACKUP_CRON_INCR: ${BACKUP_CRON_INCR:-0 2 * * 1-6}
      PATRONI_REST_USER: ${PATRONI_REST_USER:?}
      PATRONI_REST_PASSWORD: ${PATRONI_REST_PASSWORD:?}
      PATRONI_NODES: pg-1,pg-2,pg-3
      PGBACKREST_STANZA: ${PGBACKREST_STANZA:-main}
      BACKUP_REPO: ${BACKUP_REPO:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      pg-1: { condition: service_healthy }
      pg-2: { condition: service_healthy }
      pg-3: { condition: service_healthy }
