# ════════════════════════════════════════════════════════════════════
#  Dev overlay — pgAdmin.
#
#  Mặc định bind 127.0.0.1 (chỉ truy cập từ máy host) để an toàn.
#  Để truy cập từ ngoài (LAN/internet), trong .env set:
#      PGADMIN_HOST=0.0.0.0
#      PGADMIN_SERVER_MODE=True   # bật multi-user + login bắt buộc
#  CẢNH BÁO: chỉ expose pgAdmin sau firewall/VPN, KHÔNG để 0.0.0.0
#  trên public IP nếu không có TLS + reverse proxy.
#
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ════════════════════════════════════════════════════════════════════

volumes:
  pgadmin-data:

services:
  pgadmin:
    image: dpage/pgadmin4:8.13
    container_name: pgadmin
    restart: unless-stopped
    networks: [pg-ha]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "${PGADMIN_SERVER_MODE:-False}"
      PGADMIN_LISTEN_PORT: "80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      # Bind interface mặc định 127.0.0.1 (chỉ máy host).
      # Set PGADMIN_HOST=0.0.0.0 trong .env để cho phép truy cập từ ngoài.
      - "${PGADMIN_HOST:-127.0.0.1}:${PGADMIN_PORT:-8080}:80"
    depends_on:
      pgbouncer: { condition: service_healthy }
